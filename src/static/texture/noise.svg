<svg
  xmlns="http://www.w3.org/2000/svg"
  width="160"
  height="160"
  viewBox="0 0 160 160"
>
  <filter id="noise">
    <feTurbulence
      type="fractalNoise"
      baseFrequency="0.82"
      numOctaves="4"
      stitchTiles="stitch"
    />
    <feColorMatrix type="saturate" values="0" />
    <feComponentTransfer>
      <feFuncR type="linear" slope="1.8" intercept="-0.4" />
      <feFuncG type="linear" slope="1.8" intercept="-0.4" />
      <feFuncB type="linear" slope="1.8" intercept="-0.4" />
      <feFuncA type="table" tableValues="0 0.58" />
    </feComponentTransfer>
  </filter>
  <rect width="160" height="160" filter="url(#noise)" />
</svg>

    url: https://github.com/streambinder/theca
    type: wiki
    content: wikis/theca
    parent: pages/project.html.j2
    description: *proj-caption-theca
    alive: false
    jsonld:
      type: SoftwareSourceCode
  - path: /doc/erro
    name: Erro

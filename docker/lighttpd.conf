server.modules = (
    "mod_access",
    "mod_accesslog",
    "mod_deflate",
    "mod_expire",
    "mod_setenv",
)

server.document-root = "/var/www/localhost/htdocs"
server.port          = 8080
server.pid-file      = "/tmp/lighttpd.pid"
server.errorlog      = "/dev/stderr"
accesslog.filename   = "/dev/stdout"
server.tag           = ""

etag.use-inode = "disable"

index-file.names           = ( "index.html" )
mimetype.assign            = (
    ".html"  => "text/html",
    ".css"   => "text/css",
    ".js"    => "application/javascript",
    ".json"  => "application/json",
    ".svg"   => "image/svg+xml",
    ".png"   => "image/png",
    ".jpg"   => "image/jpeg",
    ".gif"   => "image/gif",
    ".ico"   => "image/x-icon",
    ".woff2" => "font/woff2",
    ".txt"   => "text/plain",
)
static-file.exclude-extensions = ( ".php", ".pl", ".fcgi" )

server.errorfile-prefix = "/var/www/localhost/htdocs/status-"

$HTTP["url"] =~ "(^|/)\." {
    url.access-deny = ( "" )
}

deflate.mimetypes = (
    "text/plain",
    "text/html",
    "text/css",
    "application/javascript",
    "application/json",
    "image/svg+xml",
)
deflate.cache-dir         = "/tmp/lighttpd-deflate"
deflate.allowed-encodings = ( "br", "gzip" )

expire.url = (
    "/favicon"    => "access plus 7 days",
    "/css/"       => "access plus 1 days",
    "/fonts/"     => "access plus 30 days",
    "/texture/"   => "access plus 7 days",
    ""            => "access plus 0 seconds",
)

setenv.add-response-header = (
    "Content-Security-Policy"   => "default-src 'none'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'",
    "X-Content-Type-Options"    => "nosniff",
    "X-Frame-Options"           => "DENY",
    "Referrer-Policy"           => "strict-origin-when-cross-origin",
    "Permissions-Policy"        => "geolocation=(), microphone=(), camera=()",
)
